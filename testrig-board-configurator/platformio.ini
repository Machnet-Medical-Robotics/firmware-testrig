; ╔══════════════════════════════════════════════════════════════╗
; ║  PlatformIO Project Configuration                           ║
; ║  Robot Board Config Controller                              ║
; ║  Target: Arduino Micro (ATmega32U4)                         ║
; ╚══════════════════════════════════════════════════════════════╝

[platformio]
default_envs = arduino_micro

; ─────────────────────────────────────────────────────────────
;  Shared base settings (inherited by all envs)
; ─────────────────────────────────────────────────────────────
[env_base]
framework        = arduino
lib_deps         =
    ; No external libraries required — all standard Arduino/AVR
build_flags      =
    -Wall
    -Wextra
    -std=gnu++17

; ─────────────────────────────────────────────────────────────
;  Primary target — Arduino Micro
; ─────────────────────────────────────────────────────────────
[env:arduino_micro]
extends          = env_base
platform         = atmelavr
board            = micro
; board_build.mcu  = atmega32u4    ; already set by 'micro' board profile
; board_build.f_cpu= 16000000L     ; already set by 'micro' board profile
upload_protocol  = avr109          ; CDC bootloader used by Arduino Micro
upload_speed     = 57600
monitor_speed    = 9600
monitor_filters  = send_on_enter, colorize

; PlatformIO finds all .cpp/.c files under src/ automatically.
; Headers under include/ are added to the include path below.
build_flags      =
    ${env_base.build_flags}
    -I include

; ─────────────────────────────────────────────────────────────
;  Optional: native unit-test environment (runs on your PC)
;  `pio test -e native` — useful for testing config_manager logic
; ─────────────────────────────────────────────────────────────
[env:native]
extends          = env_base
platform         = native
build_flags      =
    ${env_base.build_flags}
    -I include
    -D NATIVE_BUILD     ; guard used in hal.cpp to stub out Arduino calls
